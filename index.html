<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuseMix AI - 음원 맞춤형 앨범 비주얼 메이커</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {

                        },

                            50: '#1f2937', 100: '#111827', 200: '#0f172a', 300: '#020617'
                        }
                    }
                }

        body {

        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .glow-effect { box-shadow: 0 0 20px rgba(139, 92, 246, 0.15); }
        .glow-active { box-shadow: 0 0 35px rgba(139, 92, 246, 0.4); }

</head>
<body class="min-h-screen flex flex-col">

    <div id="root" class="flex-grow flex flex-col"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

   <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 브라우저 실행 시 API 키 먼저 확인
    if (!localStorage.getItem('my_gemini_key')) {
        const key = prompt("Gemini API Key를 입력하세요:");
        if (key) localStorage.setItem('my_gemini_key', key);
    }

    const SAMPLE_TRACKS = [
        {
            id: 'sample-1', title: "새벽녘의 사이버 네온", genre: "Synthwave", mood: "Dreamy",
            audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
            isSample: true, artwork: null, artworkSource: null, text: "", textSize: 70, textX: 50, textY: 85,
            textColor: '#ffffff', textStyle: 'classic', textFont: 'sans-serif', textBehind: false, maskType: 'dark', maskTolerance: 120, maskColor: '#000000'
        },
        {
            id: 'sample-2', title: "어쿠스틱 그리움", genre: "Ballad", mood: "Melancholic",
            audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            isSample: true, artwork: null, artworkSource: null, text: "", textSize: 70, textX: 50, textY: 85,
            textColor: '#ffffff', textStyle: 'classic', textFont: 'sans-serif', textBehind: false, maskType: 'dark', maskTolerance: 120, maskColor: '#000000'
        }
    ];

    const loadImage = (src) => {
        return new Promise((resolve, reject) => {
            if (!src) { resolve(null); return; }
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => resolve(img);
            img.onerror = (e) => reject(new Error(`이미지 로드 실패: ${src}`));
            if (src.startsWith('http')) { img.crossOrigin = "anonymous"; }
            img.src = src;
        });
    };

    const applyTextOverlay = async (base64Img, text, ratio, options = {}) => {
        if (!base64Img) return null;
        try {
            const bgImg = await loadImage(base64Img);
            if (!bgImg) return base64Img;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            let targetWidth = 1200, targetHeight = 1200;

            if (ratio === '16:9') { targetWidth = 1200; targetHeight = 675; }
            else if (ratio === '9:16') { targetWidth = 675; targetHeight = 1200; }
            else if (ratio === '4:3') { targetWidth = 1200; targetHeight = 900; }

            canvas.width = targetWidth; canvas.height = targetHeight;

            const imgRatio = bgImg.width / bgImg.height;
            const canvasRatio = targetWidth / targetHeight;
            let sWidth, sHeight, sx, sy;

            if (imgRatio > canvasRatio) {
                sHeight = bgImg.height; sWidth = bgImg.height * canvasRatio;
                sx = (bgImg.width - sWidth) / 2; sy = 0;
            } else {
                sWidth = bgImg.width; sHeight = bgImg.width / canvasRatio;
                sx = 0; sy = (bgImg.height - sHeight) / 2;
            }

            ctx.drawImage(bgImg, sx, sy, sWidth, sHeight, 0, 0, targetWidth, targetHeight);

            const { textSize = 70, textX = 50, textY = 85, textColor = '#ffffff', textStyle = 'classic', textFont = 'sans-serif', textBehind = false, maskType = 'dark', maskTolerance = 120, maskColor = '#000000' } = options;

            const drawTextLayer = () => {
                if (!text || text.trim() === "") return;
                ctx.save();
                const calculatedFontSize = Math.floor(targetHeight * (textSize / 1000));
                let fontFace = "sans-serif";
                if (textFont === "serif") fontFace = "'Noto Sans KR', serif";
                else if (textFont === "cursive") fontFace = "'Nanum Pen Script', cursive";

                ctx.font = `bold ${calculatedFontSize}px ${fontFace}`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const posX = targetWidth * (textX / 100); const posY = targetHeight * (textY / 100);

                if (textStyle === 'classic') {
                    const gradient = ctx.createLinearGradient(0, targetHeight * 0.75, 0, targetHeight);
                    gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                    gradient.addColorStop(0.5, 'rgba(0, 0, 0, 0.4)');
                    gradient.addColorStop(1, 'rgba(0, 0, 0, 0.75)');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, targetHeight * 0.7, targetWidth, targetHeight * 0.3);
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.85)'; ctx.shadowBlur = 10; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
                    ctx.fillStyle = textColor; ctx.fillText(text.trim(), posX, posY);
                } else if (textStyle === 'glowing') {
                    ctx.shadowColor = '#d946ef'; ctx.shadowBlur = 20;
                    ctx.strokeStyle = '#f472b6'; ctx.lineWidth = Math.max(2, calculatedFontSize * 0.1);
                    ctx.strokeText(text.trim(), posX, posY);
                    ctx.shadowBlur = 4; ctx.fillStyle = '#ffffff'; ctx.fillText(text.trim(), posX, posY);
                } else if (textStyle === 'boxed') {
                    const textWidth = ctx.measureText(text.trim()).width;
                    const boxWidth = textWidth + (calculatedFontSize * 1.2);
                    const boxHeight = calculatedFontSize * 1.5;
                    const rx = posX - (boxWidth / 2); const ry = posY - (boxHeight / 2);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
                    ctx.beginPath(); ctx.roundRect(rx, ry, boxWidth, boxHeight, 10); ctx.fill();
                    ctx.fillStyle = textColor; ctx.fillText(text.trim(), posX, posY);
                } else if (textStyle === 'outline') {
                    ctx.strokeStyle = '#000000'; ctx.lineWidth = Math.max(6, calculatedFontSize * 0.22); ctx.lineJoin = 'round';
                    ctx.strokeText(text.trim(), posX, posY);
                    ctx.fillStyle = textColor; ctx.fillText(text.trim(), posX, posY);
                }
                ctx.restore();
            };

            if (textBehind) {
                drawTextLayer();
                let fgCanvas = document.createElement('canvas'); let fgCtx = fgCanvas.getContext('2d');
                fgCanvas.width = targetWidth; fgCanvas.height = targetHeight;
                fgCtx.drawImage(bgImg, sx, sy, sWidth, sHeight, 0, 0, targetWidth, targetHeight);
                try {
                    let imgData = fgCtx.getImageData(0, 0, targetWidth, targetHeight);
                    let data = imgData.data;
                    let keyR = 0, keyG = 0, keyB = 0;
                    if (maskType === 'color' && maskColor) {
                        const hex = maskColor.replace('#', '');
                        keyR = parseInt(hex.substring(0, 2), 16); keyG = parseInt(hex.substring(2, 4), 16); keyB = parseInt(hex.substring(4, 6), 16);
                    }
                    for (let i = 0; i < data.length; i += 4) {
                        let r = data[i], g = data[i+1], b = data[i+2];
                        let lum = 0.299 * r + 0.587 * g + 0.114 * b;
                        if (maskType === 'dark' && lum > maskTolerance) data[i+3] = 0;
                        else if (maskType === 'light' && lum < maskTolerance) data[i+3] = 0;
                        else if (maskType === 'color') {
                            const dist = Math.sqrt(Math.pow(r - keyR, 2) + Math.pow(g - keyG, 2) + Math.pow(b - keyB, 2));
                            if (dist > maskTolerance) data[i+3] = 0;
                        }
                    }
                    fgCtx.putImageData(imgData, 0, 0);
                    ctx.drawImage(fgCanvas, 0, 0);
                } catch (e) {
                    ctx.clearRect(0, 0, targetWidth, targetHeight);
                    ctx.drawImage(bgImg, sx, sy, sWidth, sHeight, 0, 0, targetWidth, targetHeight);
                    drawTextLayer();
                }
            } else {
                drawTextLayer();
            }
            return canvas.toDataURL('image/png');
        } catch (error) { return base64Img; }
    };

    // 무료 이미지 생성 API 연동 (Gemini 대신 그림 그려주는 기능)
    const generateImageWithAPI = async (prompt, targetRatio = '1:1', baseImgBase64 = null) => {
        let w = 1024, h = 1024;
        if(targetRatio === '16:9') { w = 1280; h = 720; }
        else if(targetRatio === '9:16') { w = 720; h = 1280; }
        else if(targetRatio === '4:3') { w = 1024; h = 768; }

        const finalPrompt = prompt + ", highly detailed, masterpiece, beautiful scene, no text, no watermark";
        const encodedPrompt = encodeURIComponent(finalPrompt);
        const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${w}&height=${h}&nologo=true`;

        try {
            const response = await fetch(imageUrl);
            const blob = await response.blob();
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        } catch (error) {
            console.error(error);
            throw new Error("이미지 서버와 연결할 수 없습니다.");
        }
    };

    function App() {
        const [protagonistImg, setProtagonistImg] = useState(null);
        const [artStyle, setArtStyle] = useState('Watercolor');
        const [trackAspectRatio, setTrackAspectRatio] = useState('1:1'); 
        const [coverAspectRatio, setCoverAspectRatio] = useState('1:1'); 
        const [tracks, setTracks] = useState([
            { id: '1', title: '첫 번째 비행', genre: 'K-Pop', mood: 'Energetic', audioUrl: '', isSample: false, file: null, artwork: null, artworkSource: null, text: '', textSize: 70, textX: 50, textY: 85, textColor: '#ffffff', textStyle: 'classic', textFont: 'sans-serif', genMode: 'ai', textBehind: false, maskType: 'dark', maskTolerance: 120, maskColor: '#000000' },
            { id: '2', title: '비 내리는 소극장', genre: 'K-Pop', mood: 'Energetic', audioUrl: '', isSample: false, file: null, artwork: null, artworkSource: null, text: '', textSize: 70, textX: 50, textY: 85, textColor: '#ffffff', textStyle: 'classic', textFont: 'sans-serif', genMode: 'ai', textBehind: false, maskType: 'dark', maskTolerance: 120, maskColor: '#000000' }
        ]);
        const [albumTitle, setAlbumTitle] = useState('My AI Universe');
        const [albumCover, setAlbumCover] = useState(null); 
        const [albumCoverSource, setAlbumCoverSource] = useState(null); 
        const [coverPrompt, setCoverPrompt] = useState('몽환적인 보랏빛 우주 밤하늘과 거대한 빛의 고리가 일렁이는 감성 신비로운 배경');
        const [coverRefImg, setCoverRefImg] = useState(null);
        const [coverGenMode, setCoverGenMode] = useState('ai'); 
        const [coverText, setCoverText] = useState('');
        const [coverTextSize, setCoverTextSize] = useState(70);
        const [coverTextX, setCoverTextX] = useState(50);
        const [coverTextY, setCoverTextY] = useState(85); 
        const [coverTextColor, setCoverTextColor] = useState('#ffffff');
        const [coverTextStyle, setCoverTextStyle] = useState('classic'); 
        const [coverTextFont, setCoverTextFont] = useState('sans-serif'); 
        const [coverTextBehind, setCoverTextBehind] = useState(false);
        const [coverMaskType, setCoverMaskType] = useState('dark');
        const [coverMaskTolerance, setCoverMaskTolerance] = useState(120);
        const [coverMaskColor, setCoverMaskColor] = useState('#000000');
        const [expandedImg, setExpandedImg] = useState(null);
        const [currentTrackIndex, setCurrentTrackIndex] = useState(null);
        const [isPlaying, setIsPlaying] = useState(false);
        const [currentTime, setCurrentTime] = useState(0);
        const [duration, setDuration] = useState(0);
        const [isGeneratingCover, setIsGeneratingCover] = useState(false);
        const [generatingTrackId, setGeneratingTrackId] = useState(null);
        
        // 무한로딩 주범이었던 에러 해결용 상태!
        const [statusMessage, setStatusMessage] = useState('');
        const [errorMessage, setErrorMessage] = useState('');
        const showStatus = (msg) => setStatusMessage(msg);
        const showErr = (msg) => setErrorMessage(msg);

        const audioRef = useRef(null);
        const canvasRef = useRef(null);
        const animationRef = useRef(null);
        const audioCtxRef = useRef(null);
        const analyserRef = useRef(null);
        const sourceRef = useRef(null);

        useEffect(() => {
            if (albumCoverSource) {
                applyTextOverlay(albumCoverSource, coverText, coverAspectRatio, {
                    textSize: coverTextSize, textX: coverTextX, textY: coverTextY, textColor: coverTextColor,
                    textStyle: coverTextStyle, textFont: coverTextFont, textBehind: coverTextBehind,
                    maskType: coverMaskType, maskTolerance: coverMaskTolerance, maskColor: coverMaskColor
                }).then(result => setAlbumCover(result));
            } else { setAlbumCover(null); }
        }, [albumCoverSource, coverText, coverAspectRatio, coverTextSize, coverTextX, coverTextY, coverTextColor, coverTextStyle, coverTextFont, coverTextBehind, coverMaskType, coverMaskTolerance, coverMaskColor]);

        useEffect(() => {
            if (audioRef.current) {
                if (isPlaying) {
                    audioRef.current.play().catch(err => setIsPlaying(false));
                    setupVisualizer();
                } else {
                    audioRef.current.pause();
                    if (animationRef.current) cancelAnimationFrame(animationRef.current);
                }
            }
        }, [isPlaying, currentTrackIndex]);

        const handleTrackSelect = (index) => {
            if (currentTrackIndex === index) { setIsPlaying(!isPlaying); } 
            else { setCurrentTrackIndex(index); setIsPlaying(true); setCurrentTime(0); }
        };

        const setupVisualizer = () => {
            if (!canvasRef.current || !audioRef.current) return;
            if (!audioCtxRef.current) {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtxRef.current = new AudioContext();
                    analyserRef.current = audioCtxRef.current.createAnalyser();
                    analyserRef.current.fftSize = 256;
                    try {
                        sourceRef.current = audioCtxRef.current.createMediaElementSource(audioRef.current);
                        sourceRef.current.connect(analyserRef.current);
                        analyserRef.current.connect(audioCtxRef.current.destination);
                        window.audioVisualizerActive = true;
                    } catch (corsErr) { window.audioVisualizerActive = false; }
                } catch (e) { return; }
            }
            const canvas = canvasRef.current; const ctx = canvas.getContext('2d');
            const analyser = analyserRef.current;
            const bufferLength = analyser ? analyser.frequencyBinCount : 128;
            const dataArray = new Uint8Array(bufferLength);

            const draw = () => {
                if (!isPlaying) return;
                animationRef.current = requestAnimationFrame(draw);
                if (window.audioVisualizerActive && analyser) analyser.getByteFrequencyData(dataArray);
                else for (let i = 0; i < bufferLength; i++) dataArray[i] = Math.abs(Math.sin(Date.now() * 0.0025 + i * 0.15)) * 110 * (0.6 + Math.random() * 0.4);

                const width = canvas.width = canvas.parentElement.clientWidth;
                const height = canvas.height = 120;
                ctx.fillStyle = 'rgba(15, 23, 42, 0.3)'; ctx.fillRect(0, 0, width, height);

                const barWidth = (width / bufferLength) * 1.5; let barHeight; let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    barHeight = dataArray[i] / 2;
                    const gradient = ctx.createLinearGradient(0, height, 0, height - barHeight * 1.5);
                    gradient.addColorStop(0, '#7c3aed'); gradient.addColorStop(0.5, '#ec4899'); gradient.addColorStop(1, '#60a5fa');
                    ctx.fillStyle = gradient;
                    ctx.beginPath(); ctx.roundRect(x, height - barHeight, barWidth - 2, barHeight, [4, 4, 0, 0]); ctx.fill();
                    x += barWidth;
                }
            };
            draw();
        };

        const onTimeUpdate = () => { if (audioRef.current) setCurrentTime(audioRef.current.currentTime); };
        const onLoadedMetadata = () => { if (audioRef.current) setDuration(audioRef.current.duration); };
        const formatTime = (secs) => {
            if (isNaN(secs)) return "0:00";
            const mins = Math.floor(secs / 60); const remainingSecs = Math.floor(secs % 60);
            return `${mins}:${remainingSecs < 10 ? '0' : ''}${remainingSecs}`;
        };

        const handleProtagonistUpload = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => { setProtagonistImg(event.target.result); showStatus('주인공 이미지가 업로드되었습니다.'); };
            reader.readAsDataURL(file);
        };

        const handleCoverRefUpload = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => { setCoverRefImg(event.target.result); showStatus('참고 이미지가 업로드되었습니다.'); };
            reader.readAsDataURL(file);
        };

        const handleAddTrack = () => {
            const newId = (tracks.length + 1).toString();
            const firstTrack = tracks[0];
            setTracks([...tracks, {
                id: newId, title: `새로운 명작 #${newId}`, genre: firstTrack ? firstTrack.genre : 'K-Pop', mood: firstTrack ? firstTrack.mood : 'Energetic',
                audioUrl: '', isSample: false, file: null, artwork: null, artworkSource: null, text: '', textSize: 70, textX: 50, textY: 85,
                textColor: '#ffffff', textStyle: 'classic', textFont: 'sans-serif', textBehind: false, maskType: 'dark', maskTolerance: 120, maskColor: '#000000', genMode: 'ai'
            }]);
        };

        const handleRemoveTrack = (id) => {
            if (tracks.length <= 1) { showErr('최소 하나의 곡은 필요합니다.'); return; }
            setTracks(tracks.filter(t => t.id !== id));
            if (currentTrackIndex !== null && tracks[currentTrackIndex]?.id === id) { setIsPlaying(false); setCurrentTrackIndex(null); }
        };

        const updateTrackField = (id, field, value) => {
            const isFirstTrack = tracks.length > 0 && id === tracks[0].id;
            const shouldSyncAll = isFirstTrack && (field === 'genre' || field === 'mood');

            setTracks(prevTracks => {
                return prevTracks.map(t => {
                    let updatedTrack = { ...t };
                    if (shouldSyncAll) updatedTrack[field] = value;
                    else if (t.id === id) updatedTrack[field] = value;

                    const isVisualParam = ['text', 'textSize', 'textX', 'textY', 'textColor', 'textStyle', 'textFont', 'textBehind', 'maskType', 'maskTolerance', 'maskColor'].includes(field);
                    if (isVisualParam && updatedTrack.artworkSource) {
                        applyTextOverlay(updatedTrack.artworkSource, updatedTrack.text, trackAspectRatio, {
                            textSize: updatedTrack.textSize, textX: updatedTrack.textX, textY: updatedTrack.textY, textColor: updatedTrack.textColor,
                            textStyle: updatedTrack.textStyle, textFont: updatedTrack.textFont, textBehind: updatedTrack.textBehind,
                            maskType: updatedTrack.maskType, maskTolerance: updatedTrack.maskTolerance, maskColor: updatedTrack.maskColor
                        }).then(rendered => setTracks(latest => latest.map(item => item.id === updatedTrack.id ? { ...item, artwork: rendered } : item)));
                    }
                    return updatedTrack;
                });
            });
            if (shouldSyncAll) showStatus(`모든 곡의 ${field === 'genre' ? '장르' : '분위기'}가 동기화되었습니다.`);
        };

        const handleTrackAudioUpload = (id, e) => {
            const file = e.target.files[0]; if (!file) return;
            const fileUrl = URL.createObjectURL(file);
            const titleWithoutExt = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            setTracks(tracks.map(t => t.id === id ? { ...t, title: titleWithoutExt, file: file, audioUrl: fileUrl, isSample: false } : t));
            showStatus(`'${file.name}' 음원이 등록되었습니다.`);
        };

        const handleGenerateAlbumCover = async () => {
            if (isGeneratingCover) return;
            setIsGeneratingCover(true); setErrorMessage(''); showStatus('대표 썸네일 생성을 시작합니다...');

            try {
                const activeRefImg = coverRefImg || protagonistImg;
                if (activeRefImg && coverGenMode === 'overlay') {
                    setAlbumCoverSource(activeRefImg);
                    showStatus('배경 설정 완료!');
                } else {
                    let prompt = `${coverPrompt}, ${artStyle} style`;
                    const generatedImg = await generateImageWithAPI(prompt, coverAspectRatio, activeRefImg);
                    if(generatedImg) {
                        setAlbumCoverSource(generatedImg);
                        showStatus('대표 썸네일 배경이 새로 생성되었습니다!');
                    }
                }
            } catch (error) {
                console.error(error); showErr(`생성 실패: ${error.message}`);
            } finally { setIsGeneratingCover(false); }
        };

        const handleClearAlbumCover = () => { setAlbumCoverSource(null); setAlbumCover(null); showStatus('제거되었습니다.'); };

        const handleGenerateTrackArt = async (trackId) => {
            if (generatingTrackId) return;
            setGeneratingTrackId(trackId); setErrorMessage('');
            const track = tracks.find(t => t.id === trackId);
            showStatus(`'${track.title}' 생성 중...`);

            try {
                if (protagonistImg && track.genMode === 'overlay') {
                    applyTextOverlay(protagonistImg, track.text, trackAspectRatio, {
                        textSize: track.textSize, textX: track.textX, textY: track.textY, textColor: track.textColor,
                        textStyle: track.textStyle, textFont: track.textFont, textBehind: track.textBehind,
                        maskType: track.maskType, maskTolerance: track.maskTolerance, maskColor: track.maskColor
                    }).then(rendered => setTracks(prev => prev.map(t => t.id === trackId ? { ...t, artworkSource: protagonistImg, artwork: rendered } : t)));
                    showStatus(`배치 완료!`);
                } else {
                    let prompt = `${track.genre} music vibe, ${track.mood} mood, representing ${track.title}, ${artStyle} style`;
                    const generatedImg = await generateImageWithAPI(prompt, trackAspectRatio, protagonistImg);
                    if(generatedImg) {
                        applyTextOverlay(generatedImg, track.text, trackAspectRatio, {
                            textSize: track.textSize, textX: track.textX, textY: track.textY, textColor: track.textColor,
                            textStyle: track.textStyle, textFont: track.textFont, textBehind: track.textBehind,
                            maskType: track.maskType, maskTolerance: track.maskTolerance, maskColor: track.maskColor
                        }).then(rendered => setTracks(prev => prev.map(t => t.id === trackId ? { ...t, artworkSource: generatedImg, artwork: rendered } : t)));
                        showStatus(`생성 완료!`);
                    }
                }
            } catch (error) {
                console.error(error); showErr(`생성 실패: ${error.message}`);
            } finally { setGeneratingTrackId(null); }
        };

        const handleClearTrackArtwork = (trackId) => {
            setTracks(prev => prev.map(t => t.id === trackId ? { ...t, artworkSource: null, artwork: null } : t));
            showStatus('제거되었습니다.');
        };

        const handleLoadSamples = () => {
            setTracks(prev => [...prev, ...SAMPLE_TRACKS.map(st => ({ ...st, id: 'sample-' + Date.now() + Math.random().toString(36).substr(2, 4) }))]);
            showStatus('샘플 추가됨!');
        };

        const handleDownloadArtwork = (imgData, filename) => {
            if (!imgData) return;
            const link = document.createElement('a'); link.href = imgData; link.download = filename || "artwork.png";
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            showStatus('다운로드가 시작되었습니다.');
        };

        const handleCopyImage = async (dataUrl) => {
            if (!dataUrl) return;
            try {
                const res = await fetch(dataUrl); const blob = await res.blob();
                await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                alert("이미지가 복사되었습니다!");
            } catch (err) { alert("복사 실패: " + err); }
        };

        const activeTrack = currentTrackIndex !== null ? tracks[currentTrackIndex] : null;

        return (

                        <div class="w-10 h-10 bg-gradient-to-tr from-brand-600 to-pink-500 rounded-xl flex items-center justify-center glow-effect">
                            <i class="fa-solid fa-music text-white text-lg"></i>
                        </div>
                        <div>
                            <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-200 to-brand-500 bg-clip-text text-transparent">MuseMix AI</h1>
                            <p class="text-xs text-slate-400">주인공 기반 고품질 앨범 아트워크 생성기</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        {statusMessage && <span class="bg-brand-500/15 border border-brand-500/30 text-brand-100 text-xs px-3 py-1.5 rounded-lg animate-pulse flex items-center gap-2"><i class="fa-solid fa-spinner fa-spin"></i> {statusMessage}</span>}
                        {errorMessage && <span class="bg-red-500/25 border border-red-500/40 text-red-100 text-xs px-3 py-1.5 rounded-lg flex items-center gap-2"><i class="fa-solid fa-triangle-exclamation"></i> {errorMessage}</span>}
                        <button onClick={handleLoadSamples} class="text-xs bg-slate-800/80 hover:bg-slate-700 text-slate-300 font-medium px-3.5 py-1.5 rounded-lg transition-all border border-slate-700/50 flex items-center gap-2">
                            <i class="fa-solid fa-cloud-arrow-down text-brand-500"></i> 샘플 채우기
                        </button>
                    </div>

                            <div class="flex gap-4 items-center">
                                <label class="flex-grow flex flex-col items-center justify-center border-2 border-dashed border-slate-700 hover:border-brand-500/50 bg-slate-950/40 hover:bg-slate-900/40 rounded-xl p-5 cursor-pointer transition-all group">
                                    <input type="file" accept="image/*" onChange={handleProtagonistUpload} class="hidden" />
                                    <i class="fa-solid fa-cloud-arrow-up text-slate-500 group-hover:text-brand-500 text-2xl mb-2 transition-colors"></i>
                                    <span class="text-xs font-semibold text-slate-300 group-hover:text-white">사진 업로드</span>
                                </label>
                                {protagonistImg ? (
                                    <div class="relative w-24 h-24 rounded-xl border border-slate-700 bg-slate-950 flex-shrink-0 group">

                                    </div>
                                ) : (
                                    <div class="w-24 h-24 rounded-xl border border-slate-800 bg-slate-950/40 flex flex-col items-center justify-center text-slate-600 text-center p-2 flex-shrink-0"><i class="fa-solid fa-image-portrait text-xl mb-1"></i></div>
                                )}
                            </div>
                        </div>

                        <div class="bg-slate-900/60 border border-slate-800/80 rounded-2xl p-6 backdrop-blur">
                            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-white"><span class="text-brand-500"><i class="fa-solid fa-wand-magic-sparkles"></i></span> 2단계: 앨범 무드 및 스타일 설정</h2>
                            <div class="grid grid-cols-1 gap-4">
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1.5">앨범 이름</label>
                                    <input type="text" value={albumTitle} onChange={(e) => setAlbumTitle(e.target.value)} class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-brand-500/80" />
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1.5">아트워크 스타일</label>
                                    <div class="grid grid-cols-2 gap-2">
                                        {[{ id: 'Cinematic', label: '🎬 실사' }, { id: 'Anime', label: '🎨 애니메이션' }, { id: 'Cyberpunk', label: '⚡ 사이버펑크' }, { id: 'Watercolor', label: '💧 수채화' }].map(style => (

                                </div>

                                <label class="block text-xs font-medium text-slate-400 mb-1.5">적용 방식</label>

                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="block text-xs font-medium text-slate-400 mb-1.5">입힐 글자 (선택)</label>
                                <input type="text" value={coverText} onChange={(e) => setCoverText(e.target.value)} class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-brand-500/80" placeholder="텍스트 입력" />
                            </div>

                            {coverText && coverText.trim() !== "" && (
                                <div class="mb-4 p-4 bg-slate-950/60 border border-slate-800 rounded-xl space-y-3">

                                        <div><select value={coverTextStyle} onChange={(e) => setCoverTextStyle(e.target.value)} class="w-full bg-slate-900 border border-slate-800 rounded p-1.5 text-[11px] text-slate-300"><option value="classic">그림자</option><option value="glowing">발광</option><option value="boxed">박스</option><option value="outline">테두리</option></select></div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <button onClick={() => setCoverTextBehind(false)} class={`py-1.5 px-2 text-xs rounded border ${!coverTextBehind ? 'bg-brand-600/30 border-brand-500 text-white' : 'bg-slate-900 border-slate-800 text-slate-400'}`}>앞면</button>
                                        <button onClick={() => setCoverTextBehind(true)} class={`py-1.5 px-2 text-xs rounded border ${coverTextBehind ? 'bg-brand-600/30 border-brand-500 text-white' : 'bg-slate-900 border-slate-800 text-slate-400'}`}>캐릭터 뒤로</button>
                                    </div>
                                    <div class="space-y-3 pt-1">
                                        <input type="range" min="20" max="300" value={coverTextSize} onChange={(e) => setCoverTextSize(parseInt(e.target.value))} class="w-full accent-brand-500 h-1 bg-slate-800 rounded-lg appearance-none" />
                                        <input type="range" min="5" max="95" value={coverTextX} onChange={(e) => setCoverTextX(parseInt(e.target.value))} class="w-full accent-brand-500 h-1 bg-slate-800 rounded-lg appearance-none" />
                                        <input type="range" min="10" max="95" value={coverTextY} onChange={(e) => setCoverTextY(parseInt(e.target.value))} class="w-full accent-brand-500 h-1 bg-slate-800 rounded-lg appearance-none" />
                                    </div>
                                </div>
                            )}

                            <div class="mb-4 p-3 bg-slate-950/40 border border-slate-800/80 rounded-xl flex gap-3 items-center">
                                <label class="flex-grow flex items-center justify-center border border-dashed border-slate-700 bg-slate-950/60 rounded-lg p-2.5 cursor-pointer">
                                    <input type="file" accept="image/*" onChange={handleCoverRefUpload} class="hidden" />
                                    <span class="text-[11px] text-slate-300">참고 자료 이미지 첨부</span>
                                </label>
                                {coverRefImg && <img src={coverRefImg} class="w-10 h-10 rounded-lg object-cover" onClick={() => setCoverRefImg(null)} />}
                            </div>

                            {albumCover ? (
                                <div class="space-y-4 border-t border-slate-800/60 pt-4">
                                    <img src={albumCover} class="w-full rounded-xl" onClick={() => setExpandedImg(albumCover)} />
                                    <div class="grid grid-cols-2 gap-2">
                                        <button onClick={() => handleDownloadArtwork(albumCover, `${albumTitle}.png`)} class="py-2 bg-slate-800 text-white font-bold text-xs rounded-lg"><i class="fa-solid fa-download"></i> 다운로드</button>
                                        <button onClick={handleGenerateAlbumCover} disabled={isGeneratingCover} class="py-2 bg-brand-600 text-white font-bold text-xs rounded-lg">{isGeneratingCover ? '생성 중...' : '다시 그리기'}</button>
                                    </div>
                                    <button onClick={() => handleCopyImage(albumCover)} class="w-full py-2 bg-brand-500 text-white font-bold text-xs rounded-lg"><i class="fa-solid fa-copy"></i> 복사하기</button>
                                    <button onClick={handleClearAlbumCover} class="w-full py-2 bg-red-600/20 text-red-200 text-xs rounded-lg"><i class="fa-solid fa-trash"></i> 지우기</button>
                                </div>
                            ) : (
                                <button onClick={handleGenerateAlbumCover} disabled={isGeneratingCover} class="w-full mt-4 py-2.5 bg-brand-600 text-white font-bold text-xs rounded-lg">{isGeneratingCover ? '생성 중...' : '썸네일 생성'}</button>
                            )}
                        </div>
                    </section>

                    <section class="lg:col-span-7 flex flex-col gap-6">
                        <div class="bg-slate-900/60 border border-slate-800/80 rounded-2xl p-6 backdrop-blur flex-grow">
                            <div class="flex items-center justify-between mb-4">
                                <h2 class="text-lg font-bold text-white"><span class="text-brand-500"><i class="fa-solid fa-compact-disc"></i></span> 3단계: 수록곡 관리</h2>
                                <button onClick={handleAddTrack} class="py-1.5 px-3 bg-slate-800 text-white font-semibold rounded-lg text-xs"><i class="fa-solid fa-plus text-brand-500"></i> 트랙 추가</button>
                            </div>
                            <div class="space-y-4 max-h-[620px] overflow-y-auto pr-2">
                                {tracks.map((track, idx) => {
                                    const isPlayingThis = currentTrackIndex === tracks.indexOf(track) && isPlaying;
                                    return (
                                        <div key={track.id} class={`p-4 rounded-xl border ${isPlayingThis ? 'bg-slate-800/40 border-brand-500/50' : 'bg-slate-950/50 border-slate-800/80'}`}>
                                            <div class="flex justify-between mb-3">
                                                <div class="flex items-center gap-2">
                                                    <span class="w-5 h-5 bg-slate-800 text-[10px] text-slate-300 rounded-full flex items-center justify-center">{idx + 1}</span>
                                                    <input type="text" value={track.title} onChange={(e) => updateTrackField(track.id, 'title', e.target.value)} class="bg-transparent text-sm font-bold text-white focus:outline-none" />
                                                </div>
                                                <button onClick={() => handleRemoveTrack(track.id)} class="text-slate-500 hover:text-red-400"><i class="fa-solid fa-circle-minus"></i></button>
                                            </div>
                                            <div class="grid grid-cols-3 gap-2 mb-2">
                                                <select value={track.genre} onChange={(e) => updateTrackField(track.id, 'genre', e.target.value)} class="bg-slate-900 border border-slate-800 text-xs text-slate-200 rounded p-1"><option value="Ballad">발라드</option><option value="K-Pop">K-Pop</option><option value="Synthwave">신스웨이브</option><option value="Rock">락/메탈</option><option value="EDM">EDM</option></select>
                                                <select value={track.mood} onChange={(e) => updateTrackField(track.id, 'mood', e.target.value)} class="bg-slate-900 border border-slate-800 text-xs text-slate-200 rounded p-1"><option value="Melancholic">우울함</option><option value="Dreamy">몽환적</option><option value="Energetic">에너제틱</option><option value="Romantic">감성적</option></select>
                                                <label class="bg-slate-900 border border-slate-800 rounded p-1 text-[11px] text-slate-400 text-center cursor-pointer"><input type="file" accept="audio/*" onChange={(e) => handleTrackAudioUpload(track.id, e)} class="hidden" />음원 등록</label>

                                            <input type="text" value={track.text || ''} onChange={(e) => updateTrackField(track.id, 'text', e.target.value)} class="w-full bg-slate-900 border border-slate-800 rounded px-2.5 py-1.5 text-xs text-slate-200 mb-2" placeholder="이미지에 새길 텍스트" />
                                            <div class="grid grid-cols-2 gap-2 mb-2">

                                                        <div class="flex gap-2">
                                                            <button onClick={() => handleDownloadArtwork(track.artwork, `${track.title}.png`)} class="flex-1 bg-slate-800 text-white text-[11px] py-1 rounded">다운</button>

                                                            <button onClick={() => handleGenerateTrackArt(track.id)} disabled={generatingTrackId !== null} class="flex-1 bg-brand-600/20 text-brand-200 text-[11px] py-1 rounded border border-brand-500/40">재생성</button>
                                                            <button onClick={() => handleClearTrackArtwork(track.id)} class="bg-red-600/20 text-red-300 text-[11px] px-2 py-1 rounded border border-red-500/30">삭제</button>

                                                    </div>
                                                </div>

                                                <button onClick={() => handleGenerateTrackArt(track.id)} disabled={generatingTrackId !== null} class="w-full mt-2 py-2 bg-brand-600 text-white text-xs rounded-lg">{generatingTrackId === track.id ? '생성 중...' : '이미지 생성'}</button>

                                <button onClick={() => { if(currentTrackIndex < tracks.length - 1) handleTrackSelect(currentTrackIndex+1); }} disabled={currentTrackIndex === null || currentTrackIndex === tracks.length - 1} class="text-slate-400 hover:text-white"><i class="fa-solid fa-forward-step"></i></button>
                            </div>
                            <div class="w-full flex items-center gap-2 text-[10px] text-slate-400">
                                <span>{formatTime(currentTime)}</span>
                                <input type="range" min="0" max={duration || 100} value={currentTime} onChange={(e) => { const v = parseFloat(e.target.value); if(audioRef.current){ audioRef.current.currentTime = v; setCurrentTime(v); } }} class="flex-grow accent-brand-500 h-1 bg-slate-800 rounded cursor-pointer" />
                                <span>{formatTime(duration)}</span>
                            </div>
                        </div>
                        <div class="md:col-span-3 flex items-center justify-center">
                            {isPlaying ? <canvas ref={canvasRef} class="w-full max-h-[50px] opacity-80"></canvas> : <div class="text-xs text-slate-600 border border-dashed border-slate-800 rounded py-2 px-4 text-center w-full">오디오 시각화 대기중</div>}
                        </div>
                    </div>
                </footer>

                {expandedImg && (
                    <div class="fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4 backdrop-blur-md cursor-zoom-out" onClick={() => setExpandedImg(null)}>
                        <div class="relative flex flex-col items-center">
                            <img src={expandedImg} class="max-h-[85vh] rounded-xl object-contain shadow-2xl border border-slate-800" />
                            <div class="mt-4 flex gap-3">
                                <button onClick={(e) => { e.stopPropagation(); handleDownloadArtwork(expandedImg, 'expanded.png'); }} class="px-4 py-2 bg-brand-600 text-white rounded text-xs font-bold"><i class="fa-solid fa-download"></i> 다운로드</button>
                                <button onClick={(e) => { e.stopPropagation(); handleCopyImage(expandedImg); }} class="px-4 py-2 bg-brand-500 text-white rounded text-xs font-bold"><i class="fa-solid fa-copy"></i> 복사하기</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
   </script>
</body>
</html>
